# yaml-language-server: $schema=../stack.schema.json
language: rust
framework: axum
orm: sqlx
source: variant

verify:
  detect: Cargo.toml
  syntax:
    cmd: "cargo check --quiet"
    skip_if_missing: cargo
  tests:
    cmd: "cargo test --quiet"
    skip_if_missing: cargo
  raw_sql:
    patterns:
      - "sqlx::query(_as|_scalar)?\\(\"[^\"]*\\{"
      - "format!\\(\"[^\"]*(SELECT|INSERT|UPDATE|DELETE)"
    include_glob: "*.rs"
    exclude_dirs: [target, node_modules]
