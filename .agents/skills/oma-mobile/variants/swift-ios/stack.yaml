# yaml-language-server: $schema=../stack.schema.json
language: swift
framework: swiftui
ui: swiftui
state: observation
navigation: navigationstack
http_client: urlsession
local_storage: swiftdata
api_generator: swift-openapi-generator
api_spec: Core/Networking/openapi.yaml
response_cache: hyperoslo-cache
structure: App/Core/Features/Shared
source: variant

verify:
  detect: Package.swift
  syntax:
    cmd: "swift build"
    skip_if_missing: swift
  tests:
    cmd: "swift test"
    # Substring match must cover both XCTest ("Test Suite 'All tests' passed")
    # and Swift Testing ("Test run with N tests passed") summaries.
    pass_signal: "passed"
    skip_if_missing: swift
