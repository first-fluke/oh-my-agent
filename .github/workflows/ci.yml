name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check (with unsafe fixes)
        run: bunx biome check --write --unsafe .

      - name: Verify no biome drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Biome applied fixes — run 'bunx biome check --write --unsafe .' locally and commit."
            exit 1
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
