name: Sync Manifest

on:
  push:
    branches: [main]
    paths:
      - ".agents/**"
      - "cli/generate-manifest.ts"
      - "scripts/build-apm.mjs"
      - "apm.yml"
      - ".release-please-manifest.json"

jobs:
  sync-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get current version
        id: version
        run: |
          VERSION=$(jq -r '.["."]' .release-please-manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate prompt-manifest.json
        run: bunx tsx cli/generate-manifest.ts "${{ steps.version.outputs.version }}"

      - name: Build APM skills mirror
        run: node scripts/build-apm.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet prompt-manifest.json .apm apm.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit synced artifacts
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prompt-manifest.json .apm apm.yml
          git commit -m "ci: sync prompt-manifest.json and .apm mirror [skip ci]"
          git pull --rebase
          git push
